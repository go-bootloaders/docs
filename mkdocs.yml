site_name: go-bootloaders
site_description: Pure-Go bootloaders — an early-stage effort to reimplement the classic boot stack (GRUB, Limine, rEFInd, Syslinux, systemd-boot, U-Boot) in Go. No cgo. Nothing has shipped yet — this is a roadmap.
site_url: https://go-bootloaders.github.io/docs/
repo_url: https://github.com/go-bootloaders
repo_name: go-bootloaders
edit_uri: ""

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle: { icon: material/weather-night, name: Dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle: { icon: material/weather-sunny, name: Light mode }
  features: [navigation.sections, navigation.top, content.code.copy, search.suggest]

extra_css: [stylesheets/brand.css]
extra:
  version:
    provider: mike

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.highlight

nav:
  - Home: index.md
  - Roadmap & Status: roadmap.md
